syntax = "proto3";

package predictionmarkets_rec;

option cc_generic_services = true;

message RecRequest {
    string user_id = 1;
    int64 timestamp = 2;
    string request_id = 3;
    string session_id = 4;
    int32 session_refresh_num = 5;
    int32 topk = 6;
}

message FeedItem {
    string item_id = 1;
    float score = 2;
}

message RecResponse {
    int32 code = 1;
    string message = 2;
    string request_id = 3;
    int64 timestamp = 4;

    message Data {
        int32 current_refresh_num = 1;
        repeated FeedItem feed_list = 2;

        message ExtInfo {
            bool has_more = 1;
            string strategy = 2;
        }
        ExtInfo ext_info = 3;
    }
    Data data = 5;
}

service RecommendService {
    rpc recommend(RecRequest) returns (RecResponse);
}
