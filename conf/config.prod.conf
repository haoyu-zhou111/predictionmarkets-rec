{
    "server": {
        "port": 15555,
        "worker_num": 4
    },
    "log": {
        "dir": "./logs/",
        "level": 0
    },
    "redis": {
        "host": "",
        "port": 6379,
        "timeout_ms": 5,
        "connect_timeout_ms": 200,
        "max_retry": 2
    },
    "exp": {
        "local_path": "./conf/exp.conf",
        "redis_key":  "exp_config"
    },
    "data_path": {
        "item_feature":     "/data/feature/item_feature",
        "user_feature":     "/data/feature/user_feature",
        "feature_manifest": "/data/feature/feature_manifest",

        "icf_index":        "/data/recall/icf_index",
        "i2v_index":        "/data/recall/i2v_index",
        "swing_index":      "/data/recall/swing_index"
    },
    "model_path": {
        "ranking": "/data/model/lr_model"
    },
    "sync": {
        "item_pool_interval_ms":    1000,
        "item_feature_interval_ms": 300000,
        "exp_config_interval_ms":   60000,
        "ghost": {
            "admin_api_url": "https://predictionmarkets.org/ghost/api/admin",
            "admin_key":     "",
            "page_limit":    100,
            "jwt_ttl_sec":   300,
            "timeout_ms":    3000
        },
        "bandit": {
            "post_stat_key_prefix": "tracking:rec_sys:post:",
            "impression_field":     "impression_total",
            "click_field":          "click_total"
        }
    },
    "user_context": {
        "blacklist_redis_key": "user_black:",
        "history_redis_key":   "user_history:",
        "followed_redis_key":  "user_followed:",
        "published_redis_key": "user_published:"
    },
    "rec_history": {
        "key_prefix": "rec_hist:",
        "ttl_sec":    259200,
        "max_len":    200
    }
