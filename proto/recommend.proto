syntax = "proto3";

package predictionmarkets_rec;

option cc_generic_services = true;

message RecRequest {
    string user_id             = 1;
    string device_id           = 2;
    int64  timestamp           = 3;
    string request_id          = 4;
    string session_id          = 5;
    int32  session_refresh_num = 6;
    int32  topk                = 7;
    bool   is_paid_user        = 8;
}

message FeedItem {
    string item_id = 1;
    float score = 2;
}

message RecResponse {
    int32 code = 1;
    string message = 2;
    string request_id = 3;
    int64 timestamp = 4;

    message Data {
        int32 current_refresh_num = 1;
        repeated FeedItem feed_list = 2;

        message ExtInfo {
            string strategy         = 1;
            string callback_feature = 2;   // 预留：后续部分线上特征经此回传，目前留空
        }
        ExtInfo ext_info = 3;
    }
    Data data = 5;
}

service predictionmarketsRecommend {
    rpc recommend(RecRequest) returns (RecResponse);
}
